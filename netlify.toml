# netlify.toml — Netlify deployment configuration

[build]
  # The Vite app and functions both live inside the /infoshield subfolder.
  # Setting base= makes all relative paths resolve from there.
  base    = "infoshield"
  publish = "dist"
  # Install @netlify/functions before building so the function types resolve
  command = "npm install && npm run build"

[build.environment]
  # Node 20 LTS
  NODE_VERSION  = "20"

[functions]
  # netlify/functions/ relative to base (infoshield/) → infoshield/netlify/functions/
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command    = "npm run dev"
  port       = 8888
  targetPort = 5174

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets forever (content-hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA routing — all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
