# netlify.toml — Netlify deployment configuration

[build]
  # Vite app lives in /infoshield subfolder
  base    = "infoshield"
  publish = "infoshield/dist"
  command = "npm run build"

[build.environment]
  # Node 20 LTS — CustomEvent is a proper global here
  NODE_VERSION = "20"
  # Extra safety: expose CustomEvent polyfill in case Vite 8 CLI needs it before config loads
  NODE_OPTIONS  = "--experimental-global-customevent"

[functions]
  # Netlify serverless functions (social posting, news proxy)
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command    = "npm run dev"
  port       = 8888
  targetPort = 5174

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache immutable static assets forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA routing — all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
