[build]
  # Repo root is the CWD on Netlify — cd into the app subfolder explicitly
  command = "cd infoshield && npm install && npm run build"
  publish = "infoshield/dist"

[build.environment]
  # Node 20 LTS
  NODE_VERSION  = "20"

[functions]
  # Path relative to repo root
  directory    = "infoshield/netlify/functions"
  node_bundler = "esbuild"

[dev]
  command    = "npm run dev"
  port       = 8888
  targetPort = 5174

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets forever (content-hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA routing — all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
